name: Package latency test Windows

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-windows-x64:
    runs-on: windows-latest

    env:
      GITHUB_TOKEN: ${{ github.token }}
      ELECTRON_BUILDER_PUBLISH: never
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      MOSH_BIN_OWNER: binaricat
      ET_BIN_OWNER: binaricat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set package version
        shell: bash
        run: |
          VERSION="0.0.0-latency-${GITHUB_SHA:0:7}"
          echo "Setting version to ${VERSION}"
          npm pkg set version="${VERSION}"

      - name: Fetch bundled mosh-client
        run: npm run fetch:mosh:dev

      - name: Fetch bundled et-client
        run: npm run fetch:et:dev

      - name: Build package
        run: npm run pack:win-x64

      - name: Collect Windows x64 installer
        shell: bash
        run: |
          rm -rf release-upload
          mkdir -p release-upload
          find release -maxdepth 1 -type f -name '*-win-x64.exe' ! -name '*portable*' -exec cp -v '{}' release-upload/ ';'
          find release-upload -maxdepth 1 -type f -print
          test "$(find release-upload -maxdepth 1 -type f | wc -l)" -gt 0

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: netcatty-latency-windows-x64
          path: release-upload/*
          if-no-files-found: error
          retention-days: 3

      - name: Publish Windows x64 release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="fork-latency-windows-x64-latest"
          title="Fork latency Windows x64 latest"
          notes="Windows x64 installer for testing terminal network latency display."
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes "$notes" --prerelease
          else
            gh release create "$tag" --title "$title" --notes "$notes" --prerelease
          fi
          gh release upload "$tag" release-upload/* --clobber
